<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاحص الـ QR الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">QR Security Scanner</h1>
            <p class="text-slate-500 mt-2">افحص الروابط قبل فتحها للتأكد من سلامتها</p>
        </div>

        <form action="/scan" method="post" enctype="multipart/form-data" class="space-y-6">
            <div class="border-2 border-dashed border-blue-200 rounded-lg p-6 hover:border-blue-400 transition-colors cursor-pointer text-center">
                <input type="file" name="file" required class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transform transition active:scale-95 shadow-lg shadow-blue-200">
                ابدأ الفحص الآن
            </button>
        </form>
    </div>
</body>
</html>
